<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alberto Corral-Lopez — Evolutionary Biology</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f2ed;
      --bg2: #fffcf8;
      --ink: #1e1a16;
      --ink-mid: #54473c;
      --ink-light: #9e8e82;
      --teal: #2d7d6f;
      --teal-light: #4a9e8e;
      --orange: #c96c3a;
      --orange-light: #e08a5c;
      --sand: #ddd4c6;
      --yellow: #e8b84b;
      --green: #4a7c59;
      --rule: rgba(0,0,0,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family: 'Source Sans 3', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top:0; left:0; right:0; z-index:200;
      display:flex; justify-content:space-between; align-items:center;
      padding: 1rem 5vw;
      background: rgba(245,242,237,0.93);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--sand);
    }
    .nav-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; color: var(--teal); letter-spacing:0.01em;
    }
    .nav-links { display:flex; gap:2rem; list-style:none; }
    .nav-links a {
      text-decoration:none; color:var(--ink-mid);
      font-size:0.82rem; font-weight:600;
      letter-spacing:0.08em; text-transform:uppercase;
      transition:color .2s;
    }
    .nav-links a:hover { color:var(--teal); }
    .nav-mobile-toggle { display:none; background:none; border:none; cursor:pointer; font-size:1.4rem; }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      align-items: center;
      padding: 8rem 5vw 5rem;
      gap: 5vw;
      background: var(--bg2);
      position: relative;
      overflow: hidden;
    }
    #hero::after {
      content:'';
      position:absolute; bottom:-80px; right:-80px;
      width:500px; height:500px;
      background: radial-gradient(circle, rgba(45,125,111,0.08) 0%, transparent 70%);
      border-radius:50%;
      pointer-events:none;
    }
    .hero-eyebrow {
      display:flex; align-items:center; gap:0.6rem;
      margin-bottom:1.2rem;
    }
    .eyebrow-line { width:32px; height:2px; background:var(--teal); }
    .eyebrow-text {
      font-size:0.78rem; font-weight:600; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--teal);
    }
    .hero-text h1 {
      font-family:'Playfair Display', serif;
      font-size: clamp(2.6rem, 5vw, 4rem);
      font-weight:700; line-height:1.1;
      color:var(--ink); margin-bottom:1.2rem;
    }
    .hero-text h1 em { font-style:italic; color:var(--teal); }
    .hero-role { font-size:1.05rem; color:var(--ink-mid); margin-bottom:0.3rem; }
    .hero-inst { font-size:0.9rem; color:var(--ink-light); margin-bottom:1.8rem; }
    .hero-tagline {
      font-size:1rem; color:var(--ink-mid);
      max-width:520px; margin-bottom:2.5rem;
      border-left:3px solid var(--orange);
      padding-left:1rem;
      font-style:italic;
    }
    .hero-actions { display:flex; gap:1rem; flex-wrap:wrap; }
    .btn {
      display:inline-block; padding:0.72rem 1.8rem;
      border-radius:4px; font-size:0.88rem; font-weight:600;
      text-decoration:none; letter-spacing:0.04em;
      transition:all .2s; cursor:pointer; border:none;
    }
    .btn-teal { background:var(--teal); color:white; }
    .btn-teal:hover { background:#236358; transform:translateY(-1px); }
    .btn-outline { background:transparent; color:var(--orange); border:2px solid var(--orange); }
    .btn-outline:hover { background:var(--orange); color:white; }

    .hero-visual {
      position:relative; display:flex;
      flex-direction:column; align-items:center; gap:1.5rem;
    }
    .photo-container {
      width: clamp(200px,24vw,300px);
      aspect-ratio:1;
      border-radius:50%;
      background:var(--sand);
      overflow:hidden;
      border:4px solid white;
      box-shadow:0 16px 48px rgba(0,0,0,0.12);
      position:relative;
    }
    .photo-placeholder {
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:linear-gradient(135deg, #c8bfb0, #b5a898);
      color:var(--ink-mid); font-size:0.8rem;
      text-align:center; padding:1.5rem; gap:0.4rem;
    }
    .photo-placeholder span:first-child { font-size:2.5rem; }

    .stat-row {
      display:grid; grid-template-columns:repeat(2,1fr);
      gap:0.8rem; width:100%;
      max-width: clamp(200px,24vw,300px);
    }
    .stat-box {
      background:white; border:1px solid var(--sand);
      border-radius:10px; padding:0.9rem;
      text-align:center;
    }
    .stat-box .n {
      font-family:'Playfair Display',serif;
      font-size:1.6rem; font-weight:700; color:var(--teal);
    }
    .stat-box .l {
      font-size:0.72rem; color:var(--ink-light);
      text-transform:uppercase; letter-spacing:0.06em;
    }

    /* ── SECTIONS ── */
    section { padding: 5rem 5vw; }
    #about, #research, #team { background:var(--bg); }
    #news, #publications, #contact { background:var(--bg2); }

    .sec-header { margin-bottom:3rem; }
    .sec-eyebrow {
      font-size:0.75rem; font-weight:600; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--orange);
      display:flex; align-items:center; gap:0.5rem;
      margin-bottom:0.5rem;
    }
    .sec-eyebrow::before { content:''; width:24px; height:2px; background:var(--orange); }
    .sec-title {
      font-family:'Playfair Display',serif;
      font-size:clamp(1.8rem,3vw,2.4rem);
      font-weight:700; color:var(--ink);
    }
    .sec-title em { font-style:italic; color:var(--teal); }
    .max-w { max-width:1000px; margin:0 auto; }

    /* ── ABOUT ── */
    .about-grid { display:grid; grid-template-columns:2fr 1fr; gap:4rem; align-items:start; }
    .about-body p { color:var(--ink-mid); margin-bottom:1.2rem; font-size:1rem; }
    .about-sidebar {}
    .sidebar-block { margin-bottom:2rem; }
    .sidebar-label {
      font-size:0.72rem; font-weight:600; letter-spacing:0.1em;
      text-transform:uppercase; color:var(--ink-light); margin-bottom:0.8rem;
    }
    .sidebar-block a {
      display:flex; align-items:center; gap:0.5rem;
      color:var(--teal); text-decoration:none; font-size:0.88rem;
      font-weight:500; margin-bottom:0.4rem;
    }
    .sidebar-block a:hover { color:var(--orange); }

    /* ── RESEARCH ── */
    .research-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
      gap:1.4rem;
    }
    .proj-card {
      background:white; border:1px solid var(--sand);
      border-radius:12px; overflow:hidden;
      transition:transform .2s, box-shadow .2s;
      position:relative;
      display:flex; flex-direction:column;
    }
    .proj-card::after {
      content:''; position:absolute;
      bottom:0; left:0; right:0; height:3px;
    }
    .proj-card.teal::after { background:var(--teal); }
    .proj-card.orange::after { background:var(--orange); }
    .proj-card.green::after { background:var(--green); }
    .proj-card.yellow::after { background:var(--yellow); }
    .proj-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,0.08); }

    /* Photo header — shown only when a photo is set */
    .proj-photo {
      width:100%; height:160px;
      object-fit:cover; display:block;
      border-bottom:1px solid var(--sand);
    }
    .proj-photo-placeholder {
      width:100%; height:160px;
      background: linear-gradient(135deg, var(--sand) 0%, #c8bfb0 100%);
      display:flex; align-items:center; justify-content:center;
      font-size:3rem; border-bottom:1px solid var(--sand);
    }
    .proj-body { padding:1.6rem; flex:1; display:flex; flex-direction:column; }
    .proj-card h3 { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:0.6rem; }
    .proj-card p { font-size:0.88rem; color:var(--ink-mid); flex:1; }
    .proj-tags { margin-top:1rem; display:flex; flex-wrap:wrap; gap:0.4rem; }
    .tag {
      font-size:0.7rem; padding:0.2rem 0.65rem;
      border-radius:99px; background:var(--bg);
      color:var(--ink-mid); font-weight:600;
    }

    /* ── NEWS ── */
    .news-grid { display:grid; gap:1rem; }
    .news-item {
      display:grid; grid-template-columns:90px 1fr;
      gap:1.2rem; align-items:start;
      padding:1.2rem 1.4rem;
      background:white; border:1px solid var(--sand);
      border-radius:10px; transition:border-color .2s;
    }
    .news-item:hover { border-color:var(--teal-light); }
    .news-date { font-size:0.78rem; color:var(--ink-light); font-weight:600; padding-top:0.2rem; }
    .news-badge {
      display:inline-block; font-size:0.68rem; font-weight:600;
      letter-spacing:0.06em; text-transform:uppercase;
      padding:0.15rem 0.55rem; border-radius:99px;
      margin-bottom:0.3rem;
    }
    .badge-grant { background:#d4edda; color:#1a5c2e; }
    .badge-paper { background:#d0e8f5; color:#0d4870; }
    .badge-talk  { background:#fdecd0; color:#7a3e00; }
    .badge-award { background:#f5e0f5; color:#5c1a6e; }
    .badge-position { background:#e0f5f0; color:#0d5c42; }
    .badge-other { background:var(--bg); color:var(--ink-mid); }
    .news-title { font-weight:600; font-size:0.95rem; margin-bottom:0.2rem; }
    .news-text  { font-size:0.85rem; color:var(--ink-mid); }

    /* ── PUBLICATIONS ── */
    .pub-list { display:flex; flex-direction:column; gap:1rem; }
    .pub-item {
      display:grid; grid-template-columns:52px 1fr;
      gap:1rem; align-items:start;
      padding:1.3rem 1.4rem;
      background:white; border:1px solid var(--sand);
      border-radius:10px; transition:border-color .2s;
    }
    .pub-item:hover { border-color:var(--orange-light); }
    .pub-year { font-family:'Playfair Display',serif; font-size:0.88rem; color:var(--orange); font-weight:700; padding-top:0.15rem; }
    .pub-title { font-style:italic; font-size:0.97rem; margin-bottom:0.3rem; color:var(--ink); }
    .pub-authors { font-size:0.82rem; color:var(--ink-mid); margin-bottom:0.2rem; }
    .pub-journal { font-size:0.8rem; color:var(--ink-light); }
    .pub-journal strong { color:var(--teal); }
    .pub-link { display:inline-block; margin-top:0.4rem; font-size:0.78rem; color:var(--teal); text-decoration:none; font-weight:600; }
    .pub-link:hover { text-decoration:underline; }
    .scholar-link { text-align:center; margin-top:2rem; }

    /* ── TEAM ── */
    .team-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1.2rem; }
    .person-card {
      background:white; border:1px solid var(--sand);
      border-radius:12px; padding:1.4rem;
      text-align:center; transition:transform .2s;
    }
    .person-card:hover { transform:translateY(-3px); }
    .person-avatar {
      width:72px; height:72px; border-radius:50%;
      background:var(--sand); margin:0 auto 0.8rem;
      display:flex; align-items:center; justify-content:center;
      font-size:1.8rem; overflow:hidden;
    }
    .person-avatar img { width:100%; height:100%; object-fit:cover; }
    .person-name { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:0.2rem; }
    .person-role { font-size:0.78rem; color:var(--teal); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.4rem; }
    .person-since { font-size:0.75rem; color:var(--ink-light); margin-bottom:0.5rem; }
    .person-bio { font-size:0.82rem; color:var(--ink-mid); }

    .alumni-section { margin-top:3rem; }
    .alumni-title {
      font-size:0.78rem; font-weight:600; letter-spacing:0.1em;
      text-transform:uppercase; color:var(--ink-light);
      margin-bottom:1rem; padding-bottom:0.5rem;
      border-bottom:1px solid var(--sand);
    }
    .alumni-list { display:flex; flex-direction:column; gap:0.6rem; }
    .alumni-item {
      display:flex; justify-content:space-between; align-items:center;
      padding:0.7rem 1rem; background:white; border:1px solid var(--sand);
      border-radius:8px; font-size:0.88rem;
    }
    .alumni-item .aname { font-weight:600; }
    .alumni-item .arole { color:var(--ink-mid); font-size:0.8rem; }
    .alumni-item .ayears { color:var(--ink-light); font-size:0.78rem; }

    /* ── CONTACT ── */
    #contact { text-align:center; }
    .contact-intro { color:var(--ink-mid); font-size:1rem; max-width:520px; margin:0 auto 2.5rem; }
    .contact-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; max-width:700px; margin:0 auto; }
    .contact-card {
      background:white; border:1px solid var(--sand);
      border-radius:12px; padding:1.4rem 1rem;
      text-decoration:none; color:var(--ink);
      transition:all .2s; display:flex;
      flex-direction:column; align-items:center; gap:0.4rem;
    }
    .contact-card:hover { transform:translateY(-3px); border-color:var(--teal-light); }
    .contact-icon { font-size:1.5rem; }
    .contact-label { font-size:0.75rem; font-weight:600; color:var(--ink-mid); text-transform:uppercase; letter-spacing:0.06em; }
    .contact-value { font-size:0.8rem; color:var(--ink-light); word-break:break-all; }

    /* ── FOOTER ── */
    footer {
      text-align:center; padding:1.8rem;
      background:var(--ink); color:var(--ink-light); font-size:0.8rem;
    }
    footer a { color:var(--sand); }

    /* ── FADE IN ── */
    .fade { opacity:0; transform:translateY(20px); transition:opacity .5s ease, transform .5s ease; }
    .fade.in { opacity:1; transform:none; }

    /* ── LOADING ── */
    #loading {
      position:fixed; inset:0; background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      z-index:999; transition:opacity .4s;
    }
    #loading .spinner {
      width:36px; height:36px;
      border:3px solid var(--sand);
      border-top-color:var(--teal);
      border-radius:50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media(max-width:768px){
      nav { padding:.9rem 4vw; }
      .nav-links { display:none; }
      .nav-mobile-toggle { display:block; }
      .nav-links.open {
        display:flex; flex-direction:column;
        position:absolute; top:100%; left:0; right:0;
        background:var(--bg2); border-bottom:1px solid var(--sand);
        padding:1rem 4vw; gap:1rem;
      }
      #hero { grid-template-columns:1fr; padding:6rem 4vw 3rem; }
      .hero-visual { order:-1; }
      .stat-row { max-width:260px; }
      .about-grid { grid-template-columns:1fr; gap:2rem; }
      section { padding:3.5rem 4vw; }
    }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<nav id="nav">

  <ul class="nav-links" id="nav-links">

    <li><a href="#contact">Contact</a></li>
  </ul>
  <button class="nav-mobile-toggle" onclick="document.getElementById('nav-links').classList.toggle('open')">☰</button>
</nav>

<div id="app"></div>

<footer id="footer"></footer>

// ─────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────

function badgeClass(type) {
  const map = { grant:'badge-grant', paper:'badge-paper', talk:'badge-talk', award:'badge-award', position:'badge-position' };
  return map[type] || 'badge-other';
}

function render(data) {
  const s = data.site;
  document.title = `${s.name} — ${s.title}`;
  document.getElementById('nav-name').textContent = s.name;

  const statsHTML = (data.stats||[]).map(st => `
    <div class="stat-box">
      <div class="n">${st.number}</div>
      <div class="l">${st.label}</div>
    </div>`).join('');

  const researchHTML = (data.research||[]).map(p => `
    <div class="proj-card ${p.color} fade">
      ${p.photo
        ? `<img class="proj-photo" src="${p.photo}" alt="${p.title}"/>`
        : `<div class="proj-photo-placeholder">${p.emoji}</div>`
      }
      <div class="proj-body">
        <h3>${p.title}</h3>
        <p>${p.description}</p>
        <div class="proj-tags">${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        ${p.link ? `<a href="${p.link}" target="_blank" class="pub-link" style="margin-top:.8rem">→ Learn more</a>` : ''}
      </div>
    </div>`).join('');

  const newsHTML = (data.news||[]).map(n => `
    <div class="news-item fade">
      <div class="news-date">${n.date}</div>
      <div>
        <span class="news-badge ${badgeClass(n.type)}">${n.type}</span>
        <div class="news-title">${n.title}</div>
        <div class="news-text">${n.text}</div>
      </div>
    </div>`).join('');

  const pubsHTML = (data.publications||[]).map(p => {
    const linkHref = p.url || (p.doi ? `https://doi.org/${p.doi}` : '');
    const linkLabel = p.doi ? `DOI: ${p.doi}` : '→ Read paper';
    return `
    <div class="pub-item fade">
      <div class="pub-year">${p.year}</div>
      <div>
        <div class="pub-title">${p.title}</div>
        <div class="pub-authors">${p.authors}</div>
        <div class="pub-journal"><strong>${p.journal}</strong></div>
        ${linkHref ? `<a href="${linkHref}" target="_blank" class="pub-link">${linkLabel}</a>` : '<span class="pub-link" style="color:var(--ink-light);cursor:default">Link coming soon</span>'}
      </div>
    </div>`;
  }).join('');

  const currentTeam = (data.team||[]).filter(m=>m.status==='current');
  const alumni      = (data.team||[]).filter(m=>m.status==='alumni');

  const teamHTML = currentTeam.map(m => `
    <div class="person-card fade">
      <div class="person-avatar">
        ${m.photo ? `<img src="${m.photo}" alt="${m.name}"/>` : '🧬'}
      </div>
      <div class="person-name">${m.name}</div>
      <div class="person-role">${m.role}</div>
      <div class="person-since">${m.affiliation} · Since ${m.since}</div>
      <div class="person-bio">${m.bio}</div>
    </div>`).join('');

  const alumniHTML = alumni.length ? `
    <div class="alumni-section">
      <div class="alumni-title">Alumni</div>
      <div class="alumni-list">
        ${alumni.map(m=>`
          <div class="alumni-item">
            <div><span class="aname">${m.name}</span></div>
            <div class="arole">${m.role}</div>
            <div class="ayears">${m.since}${m.ended?'–'+m.ended:''}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  const contactLinks = [
    { icon:'✉️', label:'Email', value: s.email, href:`mailto:${s.email}` },
    { icon:'🔗', label:'ORCID', value: s.orcid, href:`https://orcid.org/${s.orcid}` },
    { icon:'🎓', label:'Google Scholar', value:'View profile', href: s.google_scholar },
    s.twitter ? { icon:'🐦', label:'Twitter / X', value: s.twitter, href:`https://twitter.com/${s.twitter.replace('@','')}` } : null,
  ].filter(Boolean);

  const contactHTML = contactLinks.map(c=>`
    <a href="${c.href}" target="_blank" class="contact-card fade">
      <span class="contact-icon">${c.icon}</span>
      <span class="contact-label">${c.label}</span>
      <span class="contact-value">${c.value}</span>
    </a>`).join('');

  document.getElementById('app').innerHTML = `
    <!-- HERO -->
    <section id="hero">
      <div class="hero-text fade">
        <div class="hero-eyebrow"><div class="eyebrow-line"></div><span class="eyebrow-text">Evolutionary Biology · Uppsala University</span></div>
        <h1>${s.name.split(' ').slice(0,-1).join(' ')}<br><em>${s.name.split(' ').slice(-1)[0]}</em></h1>
        <p class="hero-role">${s.title}</p>
        <p class="hero-inst">${s.institution} · ${s.location}</p>
        <p class="hero-tagline">${s.tagline}</p>
        <div class="hero-actions">
          <a href="#research" class="btn btn-teal">Explore research</a>
          <a href="#contact" class="btn btn-outline">Get in touch</a>
        </div>
      </div>
      <div class="hero-visual fade">
        <div class="photo-container">
          <div class="photo-placeholder">
            <span>🐟</span>
            <span>Add your photo</span>
            <span style="font-size:.7rem;opacity:.7">Replace with &lt;img&gt; tag</span>
          </div>
        </div>
        <img src="Wordcloud_AC_titles.png" alt="Research word cloud" style="width:100%; max-width:300px; border-radius:12px; box-shadow:0 4px 16px rgba(0,0,0,0.1);"/>
      </div>
    </section>

    <!-- ABOUT -->
    <section id="about">
      <div class="max-w">
        <div class="sec-header fade">
          <div class="sec-eyebrow">Who I am</div>
          <h2 class="sec-title">About <em>me</em></h2>
        </div>
        <div class="about-grid">
          <div class="about-body fade"><p>${s.about || data.about}</p></div>
          <div class="about-sidebar fade">
            <div class="sidebar-block">
              <div class="sidebar-label">Links</div>
              <a href="mailto:${s.email}">✉️ ${s.email}</a>
              <a href="https://orcid.org/${s.orcid}" target="_blank">🔗 ORCID ${s.orcid}</a>
              <a href="${s.google_scholar}" target="_blank">🎓 Google Scholar</a>
              ${s.twitter ? `<a href="https://twitter.com/${s.twitter.replace('@','')}" target="_blank">🐦 ${s.twitter}</a>` : ''}
            </div>
            <div class="sidebar-block">
              <div class="sidebar-label">Affiliation</div>
              <p style="font-size:.88rem;color:var(--ink-mid)">${s.institution}<br>${s.location}</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- RESEARCH -->
    <section id="research">
      <div class="max-w">
        <div class="sec-header fade">
          <div class="sec-eyebrow">What I work on</div>
          <h2 class="sec-title">Research <em>projects</em></h2>
        </div>
        <div class="research-grid">${researchHTML}</div>
      </div>
    </section>

    <!-- NEWS -->
    <section id="news">
      <div class="max-w">
        <div class="sec-header fade">
          <div class="sec-eyebrow">Latest updates</div>
          <h2 class="sec-title">News & <em>highlights</em></h2>
        </div>
        <div class="news-grid">${newsHTML}</div>
      </div>
    </section>

    <!-- PUBLICATIONS -->
    <section id="publications">
      <div class="max-w">
        <div class="sec-header fade">
          <div class="sec-eyebrow">My work</div>
          <h2 class="sec-title">Selected <em>publications</em></h2>
        </div>
        <div class="pub-list">${pubsHTML}</div>
        <div class="scholar-link fade">
          <a href="${s.google_scholar}" target="_blank" class="btn btn-outline">View full list on Google Scholar →</a>
        </div>
      </div>
    </section>

    <!-- TEAM -->
    <section id="team">
      <div class="max-w">
        <div class="sec-header fade">
          <div class="sec-eyebrow">People</div>
          <h2 class="sec-title">Team & <em>collaborators</em></h2>
        </div>
        ${currentTeam.length ? `<div class="team-grid">${teamHTML}</div>` : '<p style="color:var(--ink-light);font-style:italic">Team members coming soon.</p>'}
        ${alumniHTML}
      </div>
    </section>

    <!-- CONTACT -->
    <section id="contact">
      <div class="max-w">
        <div class="sec-header fade">
          <div class="sec-eyebrow">Let's connect</div>
          <h2 class="sec-title">Get in <em>touch</em></h2>
        </div>
        <p class="contact-intro">
          I'm always happy to hear from prospective students, collaborators, or anyone
          curious about my research. Feel free to reach out.
        </p>
        <div class="contact-grid">${contactHTML}</div>
      </div>
    </section>
  `;

  document.getElementById('footer').innerHTML = `
    <span style="color:var(--sand)">${s.name}</span> ·
    ${s.institution} ·
    Hosted free on <a href="https://pages.github.com">GitHub Pages</a>
  `;

  // Fade-in observer
  const obs = new IntersectionObserver(entries => {
    entries.forEach((e,i) => {
      if(e.isIntersecting) setTimeout(()=>e.target.classList.add('in'), i*60);
    });
  }, { threshold:0.08 });
  document.querySelectorAll('.fade').forEach(el=>obs.observe(el));

  // Hide loading
  const loader = document.getElementById('loading');
  loader.style.opacity = '0';
  setTimeout(()=>loader.style.display='none', 400);
}

// ─────────────────────────────────────────────
// BOOT: try to fetch content.yaml, fall back to embedded
// ─────────────────────────────────────────────
async function boot() {
  let data;
  try {
    const res = await fetch('content.yaml');
    if(res.ok) {
      const text = await res.text();
      data = jsyaml.load(text);
    } else { throw new Error('no file'); }
  } catch {
    data = jsyaml.load(YAML_CONTENT);
  }
  // flatten site.about if present
  if(!data.site.about && data.about) data.site.about = data.about;
  render(data);
}

boot();
</script>
</body>
