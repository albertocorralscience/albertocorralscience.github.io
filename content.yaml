site:
  name: "Alberto Corral-Lopez"
  title: "Researcher in Evolutionary Biology"
  institution: "Department of Ecology and Genetics, Uppsala University"
  location: "Uppsala, Sweden"
  email: "alberto.corral@ebc.uu.se"
  orcid: "0000-0001-7784-0209"
  google_scholar: "https://scholar.google.com/citations?user=N4I9Dz8AAAAJ&hl=en"
  bluesky: "@corrallopeza.bsky.social"  
  tagline: "Understanding the neural and molecular bases of mating decisions and social behavior"


about: >
  I am a researcher at the Department of Ecology and Genetics at Uppsala University,
  working on the mechanisms underlying mating diversity and social
  behavior. My research integrates behavioral quantification, neuroanatomy, genomics,
  and transcriptomics to understand how and why mating systems and social behaviors
  evolve. 
  I completed my PhD in Ethology at Stockholm University working in Niclas Kolm's lab, and held postdoctoral positions
  at University College London and the University of British Columbia working in Judith Mank's lab.

research:
  - title: "The molecular evolution of mating tactics in water striders"
    emoji: "🪲"
    color: "teal"
    photo: "striderphylo.png"     # e.g. "img/waterstrider.jpg" — upload photo to GitHub, put filename here
    link: "https://www.vr.se/english/swecris.html#/project/2025-05332_VR"      # optional URL to a project page or key paper
    description: >
      Funded by a Swedish Research Council Starting Grant, this project investigates
      the genetic regulation of mating behaviors in water striders. We integrate
      behavioral experiments, computer vision methods, causal tests of gene expression–behavior relationships,
      and comparative transcriptomics across multiple water strider species.
    tags: ["Water striders", "Genomics", "Mating tactics"]

  - title: "Brain size, cognition & sexual selection"
    emoji: "🧠"
    color: "yellow"
    photo: "thesis.png"
    link: "https://www.science.org/doi/full/10.1126/sciadv.1601990"
    description: >
      A long-standing research direction showing that enhanced cognitive ability associated with larger brains alters
      mating decisions. This research  been funded by the Birgitta Sintring Foundation and the Royal Swedish Academy of Sciences
      to explain how environmental variation modulates the neural and molecular mechanisms regulating mating decisions.
    tags: ["Brain size", "Guppies", "Sexual selection"]

  - title: "Neural and molecular basis of social behavior"
    emoji: "🐟"
    color: "orange"
    photo: "collective.png"
    link: "https://www.nature.com/articles/s41559-023-02249-9"
    description: >
      Funded by the Birgitta Sintring, Lars Hierta Memorial and Nilsson-Ehle Foundations, we use 
      well-established fish model systems and integrate automated high-throughput behavioral tracking, 
      targeted brain-region sampling, transcriptomics, and experimental evolution approaches for 
      investigating how social structure and ecological pressures influence neural and genomic regulation of behavior.
    tags: ["Schooling", "Neuroanatomy", "Transcriptomics"]

  - title: "Computer vision across evolutionary systems"
    emoji: "👁️"
    color: "teal"
    photo: "computools.png"
    link: "https://onlinelibrary.wiley.com/doi/full/10.1002/ece3.71945"
    description: >
      Applied computational phenotyping to diverse systems: quantifying flight pattern
      mimicry in insects, risk-taking behavior in amphibians, and tracking of fish behavior 
      for high-resolution behavioral quantification.
    tags: ["Computer vision", "Tracking", "Amphibians"]

