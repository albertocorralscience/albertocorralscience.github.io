site:
  name: "Alberto Corral-Lopez"
  title: "Researcher in Evolutionary Biology"
  institution: "Department of Ecology and Genetics, Uppsala University"
  location: "Uppsala, Sweden"
  email: "alberto.corral@ebc.uu.se"
  orcid: "0000-0001-7784-0209"
  google_scholar: "https://scholar.google.com/citations?user=N4I9Dz8AAAAJ&hl=en"
  bluesky: "@corrallopeza.bsky.social"  
  tagline: "Understanding the neural and molecular bases of mating decisions and social behavior"


about: >
  I am a researcher at the Department of Ecology and Genetics at Uppsala University,
  working on the mechanisms underlying mating diversity and social
  behavior. My research integrates behavioral quantification, neuroanatomy, genomics,
  and transcriptomics to understand how and why mating systems and social behaviors
  evolve. 
  I completed my PhD in Ethology at Stockholm University working in Niclas Kolm's lab, and held postdoctoral positions
  at University College London and the University of British Columbia working in Judith Mank's lab.

research:
  - title: "The molecular evolution of mating tactics in water striders"
    emoji: "🪲"
    color: "teal"
    photo: ""     # e.g. "img/waterstrider.jpg" — upload photo to GitHub, put filename here
    link: ""      # optional URL to a project page or key paper
    description: >
      Funded by a Swedish Research Council Starting Grant, this project investigates
      the genetic regulation of mating behaviors in water striders. We integrate
      behavioral experiments, computer vision methods, causal tests of gene expression–behavior relationships,
      and comparative transcriptomics across multiple water strider species.
    tags: ["Water striders", "Genomics", "Mating tactics"]

  - title: "Neural basis of collective behavior"
    emoji: "🐟"
    color: "orange"
    photo: ""
    link: ""
    description: >
      Using guppies selectively bred for schooling behavior, we identified how evolution
      of coordinated motion is linked to changes in brain anatomy and gene regulatory
      architecture — particularly in genes involved in neuronal migration and synaptic
      processes within the social decision-making network.
    tags: ["Schooling", "Neuroanatomy", "Transcriptomics", "Nat Comm / Nat Eco Evo"]

  - title: "Predation-driven evolution of social cognition"
    emoji: "🧠"
    color: "green"
    photo: ""
    link: ""
    description: >
      Funded by the Birgitta Sintring Foundation, we examine how strong selective
      pressure from predation shapes molecular changes underlying social cognition,
      using guppies bred for survival and the cooperatively breeding cichlid
      Neolamprologus pulcher to dissect social hierarchy mechanisms.
    tags: ["Predation", "Social cognition", "Cichlids", "Gene regulation"]

  - title: "Brain size, cognition & sexual selection"
    emoji: "💡"
    color: "yellow"
    photo: ""
    link: ""
    description: >
      A long-standing research direction using experimentally evolved guppy lines
      to show that enhanced cognitive ability associated with larger brains alters
      mating decisions — providing mechanistic evidence that cognitive evolution
      can shape sexual selection dynamics.
    tags: ["Brain size", "Guppies", "Sexual selection", "Science Advances"]

  - title: "Computer vision across evolutionary systems"
    emoji: "👁️"
    color: "teal"
    photo: ""
    link: ""
    description: >
      Applied computational phenotyping to diverse systems: quantifying flight pattern
      mimicry in Neotropical glasswing butterflies, risk-taking behavior in amphibians,
      and deep-learning-based tracking of fish behavior for high-resolution behavioral
      quantification.
    tags: ["Computer vision", "Deep learning", "Mimicry", "Amphibians"]

